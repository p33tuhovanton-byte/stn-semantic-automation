name: STN Семантический CI Конвейер

on:  
push:  
branches: \[ "main" \]  
pull\_request:  
branches: \[ "main" \]

jobs:  
test-ecosystem:  
runs-on: ubuntu-latest

steps:  
\# 1. Скачиваем актуальный код из репозитория  
\- name: Checkout repository  
uses: actions/checkout@v4

\# 2. Разворачиваем все 4 сервиса через Docker Compose V2 (без дефиса)  
\- name: Build and start STN nodes  
run: docker compose up --build -d

\# 3. Ожидаем инициализации серверов внутри контейнеров  
\- name: Wait for services initialization  
run: sleep 15

\# 4. Запускаем мультиязычный Bash-скрипт тестирования  
\- name: Run automated validation tests (test\_all.sh)  
run: |  
chmod +x test\_all.sh  
./test\_all.sh

\# 5. Останавливаем и очищаем контейнеры  
\- name: Shutdown STN nodes  
run: docker compose down